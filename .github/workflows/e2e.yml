name: E2E Tests

on:
  pull_request:
    paths:
      - "assets/**"
      - "neo-src/**"
      - ".github/workflows/**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: neo-src/go.sum

      - name: Install dependencies
        working-directory: assets
        run: pnpm install

      - name: Build frontend
        working-directory: assets
        run: pnpm run build

      - name: Build Go backend
        working-directory: neo-src
        run: go build -o bin/server ./cmd/server

      - name: Install Playwright browsers
        working-directory: assets
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: assets
        run: pnpm run test:e2e
