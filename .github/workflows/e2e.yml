name: E2E Tests

on:
  pull_request:
    paths:
      - "assets/**"
      - "src/**"
      - ".github/workflows/**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        # 升级到 v2 版本，它拥有更可靠的镜像下载逻辑
        uses: mlugg/setup-zig@v2
        with:
          # 锁定为与其它工作流一致的 Zig 版本
          version: 0.15.2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Run E2E tests
        run: bun run test:vrt
