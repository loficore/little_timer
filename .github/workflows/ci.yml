name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 前端检查：lint、build、test
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: assets
        run: pnpm install

      - name: Lint
        working-directory: assets
        run: pnpm run lint

      - name: Build
        working-directory: assets
        run: pnpm run build

      - name: Test
        working-directory: assets
        run: pnpm run test

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: neo-src/go.sum

      - name: Install system dependencies (SQLite)
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev pkg-config

      - name: Tidy
        working-directory: neo-src
        run: go mod tidy

      - name: Build
        working-directory: neo-src
        run: go build -o bin/server ./cmd/server

      - name: Test
        working-directory: neo-src
        run: go test ./...
