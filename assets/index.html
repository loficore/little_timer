<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Little Timer - 倒计时器</title>
    <script src="/webui.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, 'Microsoft YaHei', '微软雅黑', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 400px;
        }
        h1 {
            color: #333;
            margin: 0 0 20px 0;
        }
        .time {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            margin: 10px 5px;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover {
            background: #764ba2;
        }
        button:active {
            transform: scale(0.98);
        }
        .mode-indicator {
            margin-top: 15px;
            font-size: 14px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Little Timer</h1>
        <div class="time" id="time">25:00:00</div>
        <div class="controls">
            <button onclick="return handleStart();">开始</button>
            <button onclick="return handlePause();">暂停</button>
            <button onclick="return handleReset();">重置</button>
        </div>
        <div class="mode-indicator" id="mode">倒计时模式</div>
    </div>

    <script>
        // 日志辅助函数 - 带时间戳和样式
        function logInfo(msg) {
            console.log('%c[前端] ' + new Date().toLocaleTimeString() + ' - ' + msg, 
                'color: #667eea; font-weight: bold;');
        }
        
        function logSuccess(msg) {
            console.log('%c[前端] ' + new Date().toLocaleTimeString() + ' - ' + msg, 
                'color: #28a745; font-weight: bold;');
        }
        
        function logError(msg) {
            console.error('%c[前端] ' + new Date().toLocaleTimeString() + ' - ' + msg, 
                'color: #dc3545; font-weight: bold;');
        }

        // 全局按钮处理函数
        window.handleStart = function() {
            logInfo('🚀 "开始"按钮被点击');
            try {
                if (typeof webui === 'undefined') {
                    logError('❌ webui 对象未定义！');
                    return false;
                }
                logInfo('✓ webui 对象存在，准备调用 start 函数');
                webui.call('start');
                logSuccess('✓ webui.call("start") 调用成功');
            } catch (e) {
                logError('❌ 调用 start 时发生错误: ' + e.message);
                console.error(e);
            }
            return false;
        };

        window.handlePause = function() {
            logInfo('⏸️ "暂停"按钮被点击');
            try {
                if (typeof webui === 'undefined') {
                    logError('❌ webui 对象未定义！');
                    return false;
                }
                logInfo('✓ webui 对象存在，准备调用 pause 函数');
                webui.call('pause');
                logSuccess('✓ webui.call("pause") 调用成功');
            } catch (e) {
                logError('❌ 调用 pause 时发生错误: ' + e.message);
                console.error(e);
            }
            return false;
        };

        window.handleReset = function() {
            logInfo('🔄 "重置"按钮被点击');
            try {
                if (typeof webui === 'undefined') {
                    logError('❌ webui 对象未定义！');
                    return false;
                }
                logInfo('✓ webui 对象存在，准备调用 reset 函数');
                webui.call('reset');
                logSuccess('✓ webui.call("reset") 调用成功');
            } catch (e) {
                logError('❌ 调用 reset 时发生错误: ' + e.message);
                console.error(e);
            }
            return false;
        };

        // 等待DOM完全加载后再执行
        document.addEventListener('DOMContentLoaded', function() {
            logSuccess('✅ DOM已加载，应用已准备就绪');
            
            // 检查 webui 对象是否存在
            if (typeof webui !== 'undefined') {
                logSuccess('✅ webui 对象已加载');
            } else {
                logError('❌ webui 对象未加载！这可能是一个问题');
            }
            
            // 确保时间元素存在
            const timeElement = document.getElementById('time');
            if (timeElement) {
                logInfo('✓ 时间显示元素已找到: ' + timeElement.textContent);
            } else {
                logError('❌ 时间显示元素未找到！');
            }

            const modeElement = document.getElementById('mode');
            if (modeElement) {
                logInfo('✓ 模式显示元素已找到: ' + modeElement.textContent);
            } else {
                logError('❌ 模式显示元素未找到！');
            }

            logInfo('初始化完成，等待用户交互...');
        });

        // WebUI JavaScript API回调处理
        function webuiEvent(event) {
            logInfo('收到来自后端的事件: ' + event.function);
            // 处理来自Zig后端的事件
            if(event.function === 'update_time') {
                const timeElement = document.getElementById('time');
                if (timeElement) {
                    timeElement.textContent = event.data;
                    logInfo('⏱️ 时间已更新: ' + event.data);
                }
            }
            else if(event.function === 'update_mode') {
                const modeElement = document.getElementById('mode');
                if (modeElement) {
                    modeElement.textContent = event.data;
                    logInfo('🔄 模式已更新: ' + event.data);
                }
            }
        }
    </script>
</body>
</html>
