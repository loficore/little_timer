name: Release CI

on:
  release:
    types: [published]
  # 临时增加手动触发以便在修复后重试一次 workflow
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use when manually running the workflow'
        required: false
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: v2.12.0
        run: |
          set -eux
          VERSION="${GIT_CLIFF_VERSION#v}"
          ARCH="x86_64-unknown-linux-gnu"
          URL="https://github.com/orhun/git-cliff/releases/download/${GIT_CLIFF_VERSION}/git-cliff-${VERSION}-${ARCH}.tar.gz"
          TMPDIR=$(mktemp -d)
          wget -qO - "$URL" | tar -xz -C "$TMPDIR"
          BIN=$(find "$TMPDIR" -type f -name git-cliff | head -n 1 || true)
          if [ -z "$BIN" ]; then
            echo "git-cliff binary not found in archive" >&2
            ls -R "$TMPDIR" >&2 || true
            exit 1
          fi
          sudo mv "$BIN" /usr/bin/git-cliff
          sudo chmod +x /usr/bin/git-cliff
          rm -rf "$TMPDIR"
          /usr/bin/git-cliff --version

      - name: Generate release changelog
        run: |
          git-cliff --config cliff-release.toml --latest --strip header > release_notes.md

      - name: Setup Bun (frontend build)
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.x"

      - name: Setup Zig
        # 升级到 v2 版本，它拥有更可靠的镜像下载逻辑
        uses: mlugg/setup-zig@v2
        with:
          # 使用 'latest' 自动匹配最新的 0.16.0，或者保留 '0.15.2'
          version: 0.15.2

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh || true

      - name: Ensure apt universe and helper packages
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y software-properties-common ca-certificates || true
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          # 查看可用的 webkit 包以确认精确名称
          apt-cache search libwebkit | sed -n '1,200p' || true
          # 试安装必需的开发包（允许失败以便 CI 继续出错日志）
          sudo apt-get install -y pkg-config \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run packaging script (Linux)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          set -eux
          # prefer explicit release tag, then GITHUB_REF tag, then git tag, then fallback to commit short sha
          VERSION="${RELEASE_TAG#v}"
          if [ -z "$VERSION" ]; then
            if [[ "${GITHUB_REF:-}" =~ refs/tags/(.*) ]]; then
              VERSION="${BASH_REMATCH[1]}"
            fi
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(git describe --tags --exact-match 2>/dev/null || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(git rev-parse --short HEAD)
          fi
          VERSION="${VERSION#v}"
          echo "Using VERSION=$VERSION"
          ./scripts/package_linux.sh --release --embed-html --version "$VERSION"

      - name: Run packaging script (Windows x64) (cross-build)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          set -eux
          VERSION="${RELEASE_TAG#v}"
          if [ -z "$VERSION" ]; then
            if [[ "${GITHUB_REF:-}" =~ refs/tags/(.*) ]]; then
              VERSION="${BASH_REMATCH[1]}"
            fi
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(git describe --tags --exact-match 2>/dev/null || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(git rev-parse --short HEAD)
          fi
          VERSION="${VERSION#v}"
          echo "Using VERSION=$VERSION"
          ./scripts/package_mingw64.sh --release --embed-html --version "$VERSION" || true
        # allow failure here to see logs; release step will still run and attach any produced artifacts

      - name: Create GitHub Release and attach artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          name: ${{ github.event.release.name || github.event.inputs.tag }}
          bodyFile: release_notes.md
          artifacts: dist/*.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          replacesArtifacts: true
          allowUpdates: true
