[basic]
timezone = 8
language = "ZH"
default_mode = "countdown"
theme_mode = "dark"

[clock_defaults.countdown]
duration_seconds = 1500
loop = false
loop_count = 0
loop_interval_seconds = 0

[clock_defaults.stopwatch]
max_seconds = 86400

[logging]
level = "INFO"
enable_timestamp = true
tick_interval_ms = 1000  # Tick 间隔（毫秒），默认 1000ms (1秒)，范围 100-5000