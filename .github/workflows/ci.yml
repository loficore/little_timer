name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 前端检查：lint、build、test
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: assets
        run: bun install

      - name: Lint
        working-directory: assets
        run: bun run lint

      - name: Build
        working-directory: assets
        run: bun run build

      - name: Test
        working-directory: assets
        run: bun run test

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 建议开启此环境变量以消除 Node.js 20 弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        # 升级到 v2 版本，它拥有更可靠的镜像下载逻辑
        uses: mlugg/setup-zig@v2
        with:
          # 使用 'latest' 自动匹配最新的 0.16.0，或者保留 '0.15.2'
          version: 0.15.2

      - name: Install system dependencies (GTK / WebKit)
        run: |
          sudo apt-get update
          # 安装 Ubuntu 24.04 环境下正确的开发包
          sudo apt-get install -y pkg-config \
          libgtk-4-dev libwebkitgtk-6.0-dev \
          libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
